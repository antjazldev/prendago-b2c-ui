<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PrendaGo - Iniciar Sesión</title>
 
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
 
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
 
    html, body { min-height: 100%; }
 
    body {
      font-family: 'Inter', sans-serif;
      background: #F7F5F2;
      color: #1A1A1A;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 32px 16px;
    }
 
    .pg-brand {
      text-align: center;
      margin-bottom: 24px;
    }
 
    .pg-logo {
      font-weight: 700;
      font-size: 28px;
      color: #1A7A5E;
      letter-spacing: -0.5px;
      line-height: 1;
    }
 
    .pg-tagline {
      font-size: 14px;
      color: #6B6560;
      margin-top: 8px;
    }
 
    .pg-card {
      width: 100%;
      max-width: 400px;
      background: #ffffff;
      border-radius: 12px;
      border: 1px solid #E0DDD8;
      padding: 32px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.05);
    }
 
    #api {
      font-family: 'Inter', sans-serif !important;
    }
 
    #api .intro, #api .heading, #api h1, #api h2.localAccount-intro,
    .simplemodal-wrap, #distanceFromTop, .bread-crumb {
      display: none !important;
    }
 
    /* Page level errors — hidden by default, shown when B2C sets aria-hidden=false */
    #api #claimVerificationServerError,
    #api .error.pageLevel,
    #api #errorIntroduction {
      display: none !important;
    }
 
    #api #claimVerificationServerError:not([aria-hidden="true"]),
    #api .error.pageLevel[aria-hidden="false"],
    #api #errorIntroduction[aria-hidden="false"] {
      display: block !important;
      background: #FEE2E2 !important;
      border: 1px solid #E63F3F !important;
      border-radius: 8px !important;
      padding: 10px 14px !important;
      margin-bottom: 16px;
      font-family: 'Inter', sans-serif !important;
      font-size: 13px !important;
      color: #991B1B !important;
    }
 
    /* Item level errors — hidden by default, shown when aria-hidden=false */
    #api .error.itemLevel {
      display: none !important;
    }
 
    #api .error.itemLevel[aria-hidden="false"],
    #api .error.itemLevel:not([aria-hidden="true"]) {
      display: block !important;
      color: #E63F3F !important;
      font-size: 12px !important;
      font-family: 'Inter', sans-serif !important;
      margin-top: 4px !important;
      padding: 0 !important;
      background: transparent !important;
      border: none !important;
    }
 
    #api .error.itemLevel p {
      color: #E63F3F !important;
      font-size: 12px !important;
      margin: 0 !important;
    }
 
    #api .entry-item { margin-bottom: 16px; }
 
    .password-label {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 6px;
    }
 
    #api label {
      display: block;
      font-size: 13px !important;
      font-weight: 500 !important;
      margin-bottom: 6px;
      color: #1A1A1A !important;
    }
 
    #api #forgotPassword {
      margin: 0 !important;
      font-size: 13px;
      font-weight: 500;
      color: #1A7A5E !important;
      text-decoration: none;
    }
 
    #api #forgotPassword:hover { text-decoration: underline; }
 
    #api input[type="text"],
    #api input[type="email"],
    #api input[type="password"] {
      width: 100% !important;
      padding: 12px !important;
      border: 1px solid #E0DDD8 !important;
      border-radius: 8px !important;
      font-size: 14px !important;
      font-family: 'Inter', sans-serif !important;
      color: #1A1A1A !important;
      background: #fff !important;
      transition: border-color 0.15s ease;
    }
 
    #api input:focus {
      border-color: #1A7A5E !important;
      outline: none !important;
      box-shadow: 0 0 0 3px rgba(26, 122, 94, 0.1) !important;
    }
 
    /* Remove red border on invalid inputs — let B2C handle via error messages */
    #api input:invalid,
    #api input.has-error {
      border-color: #E0DDD8 !important;
      box-shadow: none !important;
    }
 
    #api .buttons { margin-top: 24px; }
 
    #api #next {
      width: 100% !important;
      padding: 12px !important;
      background: #1A7A5E !important;
      color: #fff !important;
      border: none !important;
      border-radius: 8px !important;
      font-size: 14px !important;
      font-weight: 600 !important;
      font-family: 'Inter', sans-serif !important;
      cursor: pointer;
      transition: opacity 0.15s ease;
    }
 
    #api #next:hover { opacity: 0.9; }
 
    #api .divider {
      display: flex;
      align-items: center;
      margin: 24px 0;
      color: #6B6560;
      font-size: 13px;
    }
 
    #api .divider::before, #api .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #E0DDD8;
    }
 
    #api .divider h2 {
      padding: 0 12px;
      font-size: 13px !important;
      font-weight: 400 !important;
      color: #6B6560 !important;
    }
 
    #api .create {
      text-align: center;
      font-size: 14px;
      color: #6B6560;
    }
 
    #api .create a,
    #api #createAccount {
      color: #1A7A5E !important;
      font-weight: 500;
      text-decoration: none;
    }
 
    #api .create a:hover { text-decoration: underline; }
 
    .pg-footer {
      margin-top: 24px;
      text-align: center;
      font-size: 12px;
      color: #6B6560;
    }
 
    .pg-footer a {
      color: #1A7A5E;
      text-decoration: none;
      font-weight: 500;
    }
 
    .pg-footer a:hover { text-decoration: underline; }

    /* =========================================================
       SIGNUP MODE — email verification buttons
       ========================================================= */

    /* Send verification code / Verify code — outline green */
    #api #email_ver_but_send,
    #api #email_ver_but_verify {
      background: transparent !important;
      border: 1.5px solid #1A7A5E !important;
      color: #1A7A5E !important;
      border-radius: 8px !important;
      padding: 10px 16px !important;
      font-size: 14px !important;
      font-weight: 500 !important;
      font-family: 'Inter', sans-serif !important;
      cursor: pointer;
      width: 100% !important;
      margin-top: 8px;
      transition: background 0.15s ease;
    }

    #api #email_ver_but_send:hover,
    #api #email_ver_but_verify:hover {
      background: #E8F5F0 !important;
    }

    /* Resend code — neutral outline */
    #api #email_ver_but_resend {
      background: transparent !important;
      border: 1px solid #E0DDD8 !important;
      color: #6B6560 !important;
      border-radius: 8px !important;
      padding: 8px 14px !important;
      font-size: 13px !important;
      font-weight: 500 !important;
      font-family: 'Inter', sans-serif !important;
      cursor: pointer;
      width: 100% !important;
      margin-top: 8px;
      transition: background 0.15s ease;
    }

    #api #email_ver_but_resend:hover {
      background: #F7F5F2 !important;
    }

    /* Change email — inline link */
    #api #email_ver_but_edit {
      background: transparent !important;
      border: none !important;
      color: #1A7A5E !important;
      font-size: 13px !important;
      font-family: 'Inter', sans-serif !important;
      cursor: pointer;
      padding: 4px 0 !important;
      text-decoration: underline;
      display: inline-block;
    }

    /* Verification success message */
    #api #email_ver_success {
      font-size: 13px !important;
      color: #1A7A5E !important;
      font-family: 'Inter', sans-serif !important;
      margin-top: 8px;
    }

    /* Subtitle injected by JS in signup mode */
    .pg-card-subtitle {
      font-size: 14px;
      color: #6B6560;
      font-weight: 400;
      margin-bottom: 20px;
    }

    /* =========================================================
       SIGNUP FORM — structural fixes
       ========================================================= */

    /* Hide help links and javascript: anchor links B2C sometimes injects */
    #api .helpLink,
    #api .helpLink.tiny,
    a[href*="javascript"]:not(#forgotPassword):not(#createAccount) {
      display: none !important;
    }

    /* Remove bullets B2C puts on list-based field groups */
    #api ul,
    #api li {
      list-style: none !important;
      padding: 0 !important;
      margin: 0 !important;
    }

    /* Inputs — add margin-top and display:block for signup field rows */
    #api input[type="text"],
    #api input[type="email"],
    #api input[type="password"] {
      width: 100% !important;
      padding: 12px !important;
      border: 1px solid #E0DDD8 !important;
      border-radius: 8px !important;
      font-size: 14px !important;
      font-family: 'Inter', sans-serif !important;
      margin-top: 6px !important;
      display: block !important;
    }

    /* Labels — tighter top spacing for dense signup fields */
    #api label {
      font-size: 13px !important;
      font-weight: 500 !important;
      color: #1A1A1A !important;
      display: block !important;
      margin-bottom: 4px !important;
      margin-top: 12px !important;
    }

    /* Entry / attribute row spacing */
    #api .entry-item,
    #api .attrEntry {
      margin-bottom: 4px !important;
    }

    /* =========================================================
       SIGNUP FORM — emailVerificationControl buttons
       (B2C signup uses these IDs, distinct from #email_ver_but_*)
       ========================================================= */
    #api #emailVerificationControl_but_send_code,
    #api #emailVerificationControl_but_verify_code,
    #api #emailVerificationControl_but_change_claims {
      background: transparent !important;
      border: 1.5px solid #1A7A5E !important;
      color: #1A7A5E !important;
      border-radius: 8px !important;
      padding: 10px 16px !important;
      font-size: 13px !important;
      font-weight: 500 !important;
      font-family: 'Inter', sans-serif !important;
      cursor: pointer !important;
      width: 100% !important;
      margin-top: 8px !important;
      transition: background 0.15s ease;
    }

    #api #emailVerificationControl_but_send_code:hover,
    #api #emailVerificationControl_but_verify_code:hover,
    #api #emailVerificationControl_but_change_claims:hover {
      background: #E8F5F0 !important;
    }

    /* =========================================================
       SIGNUP FORM — submit & cancel buttons
       ========================================================= */

    /* "Crear cuenta" / primary submit in signup */
    #api #continue,
    #api .sendButton {
      background: #1A7A5E !important;
      color: #fff !important;
      border: none !important;
      border-radius: 8px !important;
      padding: 12px 24px !important;
      font-size: 14px !important;
      font-weight: 600 !important;
      font-family: 'Inter', sans-serif !important;
      cursor: pointer !important;
      width: 100% !important;
      margin-top: 16px !important;
      transition: opacity 0.15s ease;
    }

    #api #continue:hover,
    #api .sendButton:hover {
      opacity: 0.9;
    }

    /* Cancel / secondary */
    #api #cancel {
      background: transparent !important;
      border: 1px solid #E0DDD8 !important;
      color: #6B6560 !important;
      border-radius: 8px !important;
      padding: 12px 24px !important;
      font-size: 14px !important;
      font-family: 'Inter', sans-serif !important;
      cursor: pointer !important;
      width: 100% !important;
      margin-top: 8px !important;
    }

    #api #cancel:hover {
      background: #F7F5F2 !important;
    }
  </style>
</head>
<body>
 
  <div class="pg-brand">
    <div class="pg-logo">PrendaGo</div>
    <p class="pg-tagline">Segunda mano, primera calidad.</p>
  </div>
 
  <div class="pg-card">
    <div id="api"></div>
  </div>
 
  <p class="pg-footer">
    Al continuar, aceptas los
    <a href="https://prendago.com/terminos" target="_blank">Términos de servicio</a>
    y la
    <a href="https://prendago.com/privacidad" target="_blank">Política de privacidad</a>
    de PrendaGo.
  </p>

  <script>
    (function () {
      var search = window.location.search || '';
      var hash   = window.location.hash   || '';
      var isSignup = (search + hash).indexOf('local=signup') !== -1;

      if (!isSignup) return;

      // 1. Update page title
      document.title = 'PrendaGo - Crear cuenta';

      // 2. Insert subtitle inside the card, before #api
      var api  = document.getElementById('api');
      var card = api && api.parentElement;
      if (card) {
        var subtitle = document.createElement('p');
        subtitle.className = 'pg-card-subtitle';
        subtitle.textContent = 'Únete a PrendaGo y empieza a vender';
        card.insertBefore(subtitle, api);
      }
    })();
  </script>

</body>
</html>
