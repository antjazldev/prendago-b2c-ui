<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PrendaGo</title>
 
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
 
  <style>
    /* =========================================================
       RESET & BASE
       ========================================================= */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
 
    html, body { min-height: 100%; }
 
    body {
      font-family: 'Inter', sans-serif;
      background: #F7F5F2;
      color: #1A1A1A;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 32px 16px;
    }
 
    /* --- BRANDING --- */
    .pg-brand { text-align: center; margin-bottom: 24px; }
    .pg-logo { font-weight: 700; font-size: 28px; color: #1A7A5E; letter-spacing: -0.5px; line-height: 1; }
    .pg-tagline { font-size: 14px; color: #6B6560; margin-top: 8px; }
 
    /* --- CARD CONTAINER --- */
    .pg-card {
      width: 100%;
      max-width: 400px;
      background: #ffffff;
      border-radius: 12px;
      border: 1px solid #E0DDD8;
      padding: 32px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.05);
    }

    /* =========================================================
       AZURE B2C ESTRUCTURA
       ========================================================= */
    #api { font-family: 'Inter', sans-serif !important; }
 
    /* Ocultar basura inyectada por B2C */
    #api .intro, #api .heading, #api h1, #api h2.localAccount-intro,
    .simplemodal-wrap, #distanceFromTop, .bread-crumb, #api .helpLink {
      display: none !important;
    }

    /* Limpieza de listas (Elimina los puntos negros de Sign Up) */
    #api ul, #api li {
      list-style: none !important;
      padding: 0 !important;
      margin: 0 !important;
    }

    /* =========================================================
       ERRORES (PAGE & ITEM LEVEL)
       ========================================================= */
    #api #claimVerificationServerError, #api .error.pageLevel, #api #errorIntroduction {
      display: none !important;
    }
 
    #api #claimVerificationServerError:not([aria-hidden="true"]),
    #api .error.pageLevel[aria-hidden="false"],
    #api #errorIntroduction[aria-hidden="false"] {
      display: block !important;
      background: #FEE2E2 !important;
      border: 1px solid #E63F3F !important;
      border-radius: 8px !important;
      padding: 10px 14px !important;
      margin-bottom: 16px;
      font-size: 13px !important;
      color: #991B1B !important;
    }
 
    #api .error.itemLevel:not([aria-hidden="true"]),
    #api .error.itemLevel[aria-hidden="false"] {
      display: block !important;
      color: #E63F3F !important;
      font-size: 12px !important;
      margin-top: 4px !important;
    }

    /* =========================================================
       INPUTS & LABELS
       ========================================================= */
    #api label {
      display: block !important;
      font-size: 13px !important;
      font-weight: 500 !important;
      margin-bottom: 6px !important;
      margin-top: 16px !important;
      color: #1A1A1A !important;
    }

    /* Evitar espacio extra en el primer label */
    #api .entry-item:first-child label, 
    #api li:first-child label,
    #api .attrEntry:first-child label { margin-top: 0 !important; }
 
    #api input {
      width: 100% !important;
      padding: 12px !important;
      border: 1px solid #E0DDD8 !important;
      border-radius: 8px !important;
      font-size: 14px !important;
      font-family: 'Inter', sans-serif !important;
      color: #1A1A1A !important;
      background: #fff !important;
      transition: all 0.15s ease;
      display: block !important;
    }
 
    #api input:focus {
      border-color: #1A7A5E !important;
      outline: none !important;
      box-shadow: 0 0 0 3px rgba(26, 122, 94, 0.1) !important;
    }

    /* =========================================================
       BOTONES (SIGN IN & SIGN UP)
       ========================================================= */
    #api .buttons { margin-top: 24px; display: flex; flex-direction: column; gap: 8px; }

    /* Botones de acción principal */
    #api #next, #api #continue, #api .sendButton {
      width: 100% !important;
      padding: 12px !important;
      background: #1A7A5E !important;
      color: #fff !important;
      border: none !important;
      border-radius: 8px !important;
      font-size: 14px !important;
      font-weight: 600 !important;
      cursor: pointer;
      order: 1;
      transition: opacity 0.15s;
    }

    /* Botón Cancelar */
    #api #cancel {
      width: 100% !important;
      padding: 12px !important;
      background: transparent !important;
      border: 1px solid #E0DDD8 !important;
      color: #6B6560 !important;
      border-radius: 8px !important;
      font-size: 14px !important;
      cursor: pointer;
      order: 2;
    }

    /* Botones de verificación de Email (Signup) */
    #api #emailVerificationControl_but_send_code,
    #api #emailVerificationControl_but_verify_code,
    #api #emailVerificationControl_but_change_claims,
    #api #email_ver_but_send,
    #api #email_ver_but_verify {
      background: transparent !important;
      border: 1.5px solid #1A7A5E !important;
      color: #1A7A5E !important;
      padding: 10px !important;
      margin-top: 8px !important;
      font-weight: 500 !important;
      border-radius: 8px !important;
      width: 100% !important;
      cursor: pointer;
    }

    #api button:hover { opacity: 0.9; }

    /* =========================================================
       ELEMENTOS ESPECÍFICOS
       ========================================================= */
    #api #forgotPassword {
      font-size: 13px;
      font-weight: 500;
      color: #1A7A5E !important;
      text-decoration: none;
      display: inline-block;
      margin-bottom: 8px !important;
    }

    #api .divider {
      display: flex;
      align-items: center;
      margin: 24px 0;
      color: #6B6560;
    }
    #api .divider::before, #api .divider::after { content: ""; flex: 1; height: 1px; background: #E0DDD8; }
    #api .divider h2 { padding: 0 12px; font-size: 13px !important; font-weight: 400 !important; }

    #api .create { text-align: center; font-size: 14px; color: #6B6560; }
    #api #createAccount { color: #1A7A5E !important; font-weight: 500; text-decoration: none; }

    .pg-card-subtitle { font-size: 14px; color: #6B6560; margin-bottom: 20px; }
    .pg-footer { margin-top: 24px; text-align: center; font-size: 12px; color: #6B6560; }
    .pg-footer a { color: #1A7A5E; text-decoration: none; font-weight: 500; }

    /* =========================================================
       SELFASSERTED (SIGNUP) — targeted fixes
       ========================================================= */

    /* 1. Hide all helpLink anchors */
    #api a.helpLink {
      display: none !important;
    }

    /* 2. Remove bullets from attributeList */
    #api #attributeList ul,
    #api #attributeList li {
      list-style: none !important;
      padding-left: 0 !important;
      margin-left: 0 !important;
    }

    /* 3. Spacing between field groups */
    #api .attrEntry {
      margin-bottom: 12px !important;
    }

    /* 4. Verify-email buttons container spacing */
    #api .verificationControlContent .buttons {
      margin-top: 8px !important;
    }

    /* 5. Hide intro paragraph in SelfAsserted form */
    #api[data-name="SelfAsserted"] .intro {
      display: none !important;
    }

    /* 6. Hide the empty top buttons div B2C injects in SelfAsserted */
    #api[data-name="SelfAsserted"] > .buttons:first-child {
      display: none !important;
    }
  </style>
</head>
<body>
 
  <div class="pg-brand">
    <div class="pg-logo">PrendaGo</div>
    <p class="pg-tagline">Segunda mano, primera calidad.</p>
  </div>
 
  <div class="pg-card">
    <div id="api"></div>
  </div>
 
  <p class="pg-footer">
    Al continuar, aceptas los
    <a href="https://prendago.com/terminos" target="_blank">Términos de servicio</a>
    y la
    <a href="https://prendago.com/privacidad" target="_blank">Política de privacidad</a>
    de PrendaGo.
  </p>

  <script>
    (function () {

      /* ------------------------------------------------------------------
         1. CLEANUP — applied once B2C injects the signup form into #api
         ------------------------------------------------------------------ */
      function applySignupFixes(root) {
        // Remove helpLink elements
        root.querySelectorAll('.helpLink, a.helpLink').forEach(function (el) {
          el.style.display = 'none';
        });

        // Remove bullets from every li
        root.querySelectorAll('li').forEach(function (li) {
          li.style.listStyle  = 'none';
          li.style.paddingLeft = '0';
          li.style.marginLeft  = '0';
        });

        // sendCode-class buttons → outline green
        root.querySelectorAll(
          '.sendCode,' +
          '[id$="_but_send_code"],' +
          '[id$="_but_verify_code"],' +
          '[id$="_but_change_claims"],' +
          '#email_ver_but_send,' +
          '#email_ver_but_verify'
        ).forEach(function (btn) {
          btn.style.background   = 'transparent';
          btn.style.border       = '1.5px solid #1A7A5E';
          btn.style.color        = '#1A7A5E';
          btn.style.borderRadius = '8px';
          btn.style.padding      = '10px 16px';
          btn.style.fontSize     = '13px';
          btn.style.fontWeight   = '500';
          btn.style.cursor       = 'pointer';
          btn.style.width        = '100%';
          btn.style.marginTop    = '8px';
          btn.style.fontFamily   = "'Inter', sans-serif";
        });

        // #continue button → solid green (primary)
        var continueBtn = root.querySelector('#continue');
        if (continueBtn) {
          continueBtn.style.background   = '#1A7A5E';
          continueBtn.style.color        = '#ffffff';
          continueBtn.style.border       = 'none';
          continueBtn.style.borderRadius = '8px';
          continueBtn.style.padding      = '12px';
          continueBtn.style.fontSize     = '14px';
          continueBtn.style.fontWeight   = '600';
          continueBtn.style.cursor       = 'pointer';
          continueBtn.style.width        = '100%';
          continueBtn.style.fontFamily   = "'Inter', sans-serif";
        }

        // All text / email / password inputs
        root.querySelectorAll(
          'input[type="text"],' +
          'input[type="email"],' +
          'input[type="password"],' +
          'input[type="tel"]'
        ).forEach(function (input) {
          input.style.width        = '100%';
          input.style.padding      = '12px';
          input.style.border       = '1px solid #E0DDD8';
          input.style.borderRadius = '8px';
          input.style.fontSize     = '14px';
          input.style.fontFamily   = "'Inter', sans-serif";
          input.style.color        = '#1A1A1A';
          input.style.background   = '#ffffff';
          input.style.display      = 'block';
          input.style.boxSizing    = 'border-box';
        });

        // Spacing between attribute-entry rows
        root.querySelectorAll('.attrEntry').forEach(function (entry) {
          entry.style.marginBottom = '12px';
        });
      }

      /* ------------------------------------------------------------------
         MutationObserver — watches #api; fires applySignupFixes once
         children appear, then disconnects to avoid infinite loops
         ------------------------------------------------------------------ */
      var apiEl = document.getElementById('api');
      if (apiEl) {
        var cleanupObserver = new MutationObserver(function (mutations, obs) {
          if (apiEl.children.length > 0) {
            applySignupFixes(apiEl);
            obs.disconnect();
          }
        });
        cleanupObserver.observe(apiEl, { childList: true, subtree: true });
      }

      /* ------------------------------------------------------------------
         2. NOVALIDATE — prevents native HTML5 validation conflicts with B2C
         ------------------------------------------------------------------ */
      var formObserver = new MutationObserver(function (mutations, obs) {
        var form = document.querySelector('#localAccountForm') ||
                   document.querySelector('#attributeVerification');
        if (form) {
          form.setAttribute('novalidate', 'novalidate');
          var emailInput = document.querySelector('#email');
          if (emailInput) emailInput.removeAttribute('pattern');
          obs.disconnect();
        }
      });
      formObserver.observe(document.body, { childList: true, subtree: true });

      /* ------------------------------------------------------------------
         3. SIGN-IN vs SIGN-UP — title and card subtitle
         ------------------------------------------------------------------ */
      var search   = window.location.search || '';
      var hash     = window.location.hash   || '';
      var isSignup = (search + hash).indexOf('local=signup') !== -1;

      if (isSignup) {
        document.title = 'PrendaGo - Crear cuenta';
        var api = document.getElementById('api');
        if (api && api.parentElement) {
          var subtitle = document.createElement('p');
          subtitle.className   = 'pg-card-subtitle';
          subtitle.textContent = 'Únete a PrendaGo y empieza a vender';
          api.parentElement.insertBefore(subtitle, api);
        }
      } else {
        document.title = 'PrendaGo - Iniciar Sesión';
      }

    })();
  </script>
</body>
</html>
