<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PrendaGo - Iniciar Sesión</title>

  <!-- Inter from Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* =====================================================================
       RESET & BASE
       ===================================================================== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #F7F5F2;
      color: #1A1A1A;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 32px 16px;
    }

    /* =====================================================================
       BRANDING
       ===================================================================== */
    .pg-brand {
      text-align: center;
      margin-bottom: 24px;
    }

    .pg-logo {
      font-weight: 700;
      font-size: 28px;
      color: #1A7A5E;
      letter-spacing: -0.5px;
      line-height: 1;
    }

    .pg-tagline {
      font-size: 14px;
      color: #6B6560;
      margin-top: 8px;
    }

    /* =====================================================================
       CARD CONTAINER
       ===================================================================== */
    .pg-card {
      width: 100%;
      max-width: 400px;
      background: #ffffff;
      border-radius: 12px;
      border: 1px solid #E0DDD8;
      padding: 32px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.05);
    }

    /* =====================================================================
       AZURE B2C - API OVERRIDES
       ===================================================================== */
    #api {
      font-family: 'Inter', sans-serif !important;
    }

    /* Hidden Elements by Default */
    #api .intro, #api .heading, #api h1, #api h2.localAccount-intro,
    .simplemodal-wrap, #distanceFromTop, .bread-crumb {
      display: none !important;
    }

    /* FIX: HIDE RED BOX WHEN EMPTY OR HIDDEN */
    #api .error.pageLevel, 
    #api #claimVerificationServerError, 
    #api #errorIntroduction {
      display: none !important; /* Force hide by default */
    }

    /* SHOW ERROR ONLY WHEN ACTIVE */
    #api .error.pageLevel[aria-hidden="false"],
    #api #claimVerificationServerError:not([aria-hidden="true"]),
    #api .error.pageLevel:not(:empty) {
      display: block !important;
      background: #FEE2E2 !important;
      border: 1px solid #E63F3F !important;
      color: #991B1B !important;
      border-radius: 8px !important;
      padding: 10px 14px !important;
      margin-bottom: 16px;
      font-size: 13px !important;
    }

    /* Field Level Errors */
    #api .error.itemLevel:not(:empty) {
      display: block !important;
      color: #E63F3F !important;
      font-size: 12px !important;
      margin-top: 4px;
    }

    /* Form Layout */
    #api .entry-item { margin-bottom: 16px; }
    
    /* Password Label Alignment */
    .password-label {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 6px;
    }

    #api label {
      display: block;
      font-size: 13px !important;
      font-weight: 500 !important;
    }

    #api #forgotPassword {
      margin: 0 !important;
      font-size: 13px;
      font-weight: 500;
    }

    /* Inputs */
    #api input[type="text"], #api input[type="email"], #api input[type="password"] {
      width: 100% !important;
      padding: 12px !important;
      border: 1px solid #E0DDD8 !important;
      border-radius: 8px !important;
      font-size: 14px !important;
      transition: border-color 0.15s ease;
    }

    #api input:focus {
      border-color: #1A7A5E !important;
      outline: none !important;
      box-shadow: 0 0 0 3px rgba(26, 122, 94, 0.1) !important;
    }

    /* Buttons */
    #api .buttons { margin-top: 24px; }
    #api #next {
      width: 100% !important;
      padding: 12px !important;
      background: #1A7A5E !important;
      color: #fff !important;
      border: none !important;
      border-radius: 8px !important;
      font-weight: 600 !important;
      cursor: pointer;
    }

    #api #next:hover { opacity: 0.9; }

    /* Divider */
    #api .divider {
      display: flex;
      align-items: center;
      margin: 24px 0;
      color: #6B6560;
      font-size: 13px;
    }
    #api .divider::before, #api .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #E0DDD8;
    }
    #api .divider h2 { padding: 0 12px; font-size: 13px !important; }

    /* Footer */
    .pg-footer {
      margin-top: 24px;
      text-align: center;
      font-size: 12px;
      color: #6B6560;
    }
    .pg-footer a { color: #1A7A5E; text-decoration: none; font-weight: 500; }
    .pg-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="pg-brand">
    <div class="pg-logo">PrendaGo</div>
    <p class="pg-tagline">Segunda mano, primera calidad.</p>
  </div>

  <div class="pg-card">
    <!-- Azure AD B2C Placeholder -->
    <div id="api"></div>
  </div>

  <p class="pg-footer">
    Al continuar, aceptas los 
    <a href="https://prendago.com/terminos" target="_blank">Términos de servicio</a> y la 
    <a href="https://prendago.com/privacidad" target="_blank">Política de privacidad</a> de PrendaGo.
  </p>

</body>
</html>
